<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORACLE — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.15);
    --cyan-glow: rgba(0,212,255,0.4);
    --gold: #f0a500;
    --gold-dim: rgba(240,165,0,0.15);
    --red: #ff3b3b;
    --bg: #040c14;
    --bg2: #071422;
    --bg3: #0a1f32;
    --panel: rgba(0,20,40,0.85);
    --border: rgba(0,212,255,0.2);
    --border-bright: rgba(0,212,255,0.6);
    --text: #c8eeff;
    --text-dim: rgba(200,238,255,0.45);
    --font-main: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(0,60,120,0.35) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .arc-reactor {
    width: 38px;
    height: 38px;
    position: relative;
    flex-shrink: 0;
  }
  .arc-reactor svg { width: 100%; height: 100%; }

  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes spin-rev  { to { transform: rotate(-360deg); } }
  @keyframes pulse-core { 0%,100%{opacity:1;r:5} 50%{opacity:0.7;r:4} }
  @keyframes hud-scan { 0%{transform:translateY(-100%)} 100%{transform:translateY(400%)} }

  .ring-outer { animation: spin-slow 8s linear infinite; transform-origin: 19px 19px; }
  .ring-inner { animation: spin-rev 5s linear infinite; transform-origin: 19px 19px; }
  .core-dot   { animation: pulse-core 2s ease-in-out infinite; }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-glow);
  }
  .logo-sub {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s ease-in-out infinite;
  }
  .dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .model-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gold);
    border: 1px solid rgba(240,165,0,0.3);
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
  }



  /* ── CHAT AREA ── */
  #chat-container {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 800px;
    animation: msg-in 0.3s ease-out;
  }
  @keyframes msg-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.jarvis { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .msg.jarvis .msg-avatar {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .msg.user .msg-avatar {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 16px;
    line-height: 1.6;
    max-width: 680px;
    position: relative;
  }

  .msg.jarvis .msg-bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan);
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: rgba(240,165,0,0.08);
    border: 1px solid rgba(240,165,0,0.25);
    border-right: 2px solid var(--gold);
    clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
    color: var(--text);
  }

  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(0,212,255,0.08);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 2px;
    color: var(--cyan);
  }

  .msg-bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan);
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #a8d8f0;
    line-height: 1.5;
  }

  .msg-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg.user .msg-time { text-align: right; }

  /* Thinking animation */
  .thinking-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan);
  }
  .thinking-bubble span {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: think-bounce 1.2s ease-in-out infinite;
  }
  .thinking-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes think-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  /* ── INPUT BAR ── */
  #input-bar {
    position: relative;
    z-index: 10;
    padding: 14px 24px 18px;
    border-top: 1px solid var(--border);
    background: linear-gradient(0deg, rgba(0,212,255,0.03) 0%, transparent 100%);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: 1px solid var(--cyan);
    padding: 10px 14px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: var(--cyan);
    box-shadow: 0 0 20px var(--cyan-dim);
  }
  .input-wrapper::before {
    content: '//';
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--cyan);
    opacity: 0.5;
    align-self: center;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 16px;
    font-weight: 400;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text-dim); }

  .input-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .btn-icon {
    width: 34px; height: 34px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .btn-icon:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
  .btn-icon.active { border-color: var(--red); color: var(--red); background: rgba(255,59,59,0.1); animation: pulse-btn 1s ease-in-out infinite; }
  @keyframes pulse-btn { 0%,100%{box-shadow:0 0 0 0 rgba(255,59,59,0.4)} 50%{box-shadow:0 0 0 6px rgba(255,59,59,0)} }

  .btn-send {
    height: 34px;
    padding: 0 18px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: var(--font-main);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    text-transform: uppercase;
  }
  .btn-send:hover { background: var(--cyan-dim); box-shadow: 0 0 14px var(--cyan-glow); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── COMMAND HINTS ── */
  .cmd-hints {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .cmd-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .cmd-hint:hover { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }

  /* ── HUD scan line ── */
  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.15;
    animation: hud-scan 6s linear infinite;
    pointer-events: none;
    z-index: 5;
  }

  /* ── Corner decorations ── */
  .corner { position: fixed; width: 20px; height: 20px; pointer-events: none; z-index: 2; }
  .corner.tl { top: 6px; left: 6px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.tr { top: 6px; right: 6px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner.bl { bottom: 6px; left: 6px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.br { bottom: 6px; right: 6px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  /* ── MARKDOWN rendering ── */
  .msg-bubble strong { color: var(--cyan); font-weight: 600; }
  .msg-bubble em { color: var(--gold); font-style: italic; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    font-family: var(--font-main);
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--cyan);
    margin: 8px 0 4px;
  }

  /* Speech wave animation */
  .speech-wave {
    display: none;
    align-items: center;
    gap: 3px;
    height: 20px;
  }
  .speech-wave.active { display: flex; }
  .speech-wave span {
    display: block;
    width: 3px;
    background: var(--red);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .speech-wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .speech-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .speech-wave span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
  .speech-wave span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
  .speech-wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
</style>
</head>
<body>

<div class="scan-line"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>



<!-- MAIN APP -->
<header>
  <div class="logo">
    <div class="arc-reactor">
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="18" stroke="rgba(0,212,255,0.3)" stroke-width="0.5"/>
        <g class="ring-outer">
          <circle cx="19" cy="19" r="14" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.6"/>
          <rect x="18" y="5" width="2" height="4" rx="1" fill="#00d4ff" opacity="0.8"/>
          <rect x="18" y="29" width="2" height="4" rx="1" fill="#00d4ff" opacity="0.8"/>
          <rect x="5" y="18" width="4" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
          <rect x="29" y="18" width="4" height="2" rx="1" fill="#00d4ff" opacity="0.8"/>
        </g>
        <g class="ring-inner">
          <circle cx="19" cy="19" r="9" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"/>
        </g>
        <circle cx="19" cy="19" r="5" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="0.8"/>
        <circle class="core-dot" cx="19" cy="19" r="5" fill="#00d4ff" opacity="0.9"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-title">ORACLE</span>
      <span class="logo-sub">ALL-KNOWING AI SYSTEM</span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot">
      <div class="dot" id="status-dot"></div>
      <span id="status-text" style="font-family:var(--font-mono);font-size:11px;">OFFLINE</span>
    </div>
    <div class="model-badge" id="model-badge">—</div>
    <button class="btn-icon" onclick="clearChat()" title="Clear conversation">🗑</button>
    <button class="btn-icon" onclick="toggleMute()" id="mute-btn" title="Toggle voice">🔊</button>
  </div>
</header>

<div id="chat-container">
  <div id="messages"></div>

  <div id="input-bar">
    <div class="cmd-hints">
      <span class="cmd-hint" onclick="useHint('search ')">⌕ SEARCH</span>
      <span class="cmd-hint" onclick="useHint('open youtube')">↗ OPEN YOUTUBE</span>
      <span class="cmd-hint" onclick="useHint('open github')">↗ OPEN GITHUB</span>
      <span class="cmd-hint" onclick="useHint('write Python code to ')">{ } CODE</span>
      <span class="cmd-hint" onclick="useHint('explain ')">? EXPLAIN</span>
      <span class="cmd-hint" onclick="clearChat()">⟳ CLEAR</span>
    </div>
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Ask ORACLE anything..."></textarea>
      <div class="speech-wave" id="speech-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="input-actions">
        <button class="btn-icon" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">SEND</button>
      </div>
    </div>
  </div>
</div>

<script>
const MODEL = 'moonshot-v1-8k'; // handled by backend

let conversation = [];
let isMuted = false;
let isListening = false;
let recognition = null;
let synth = window.speechSynthesis;

// Auto-start on load
window.addEventListener('load', () => {
  document.getElementById('model-badge').textContent = 'KIMI K2.5';
  document.getElementById('status-dot').classList.remove('off');
  document.getElementById('status-text').textContent = 'ONLINE';

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';
  addMessage('jarvis', `Good ${greeting}, Sir. ORACLE online. All systems nominal. Running on **Kimi K2.5**. How may I assist you today??`);

  setupSpeechRecognition();
  setupTextarea();
});

// ── Textarea auto-resize ─────────────────────────
function setupTextarea() {
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  ta.focus();
}

// ── Markdown renderer ────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ── Add message ──────────────────────────────────
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'jarvis' ? 'AI' : 'YOU';

  const col = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderMarkdown(text);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  col.appendChild(bubble);
  col.appendChild(time);
  wrapper.appendChild(avatar);
  wrapper.appendChild(col);
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function addThinking() {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg jarvis';
  wrapper.id = 'thinking-msg';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

// ── Send message ─────────────────────────────────
async function sendMessage() {
  const ta = document.getElementById('user-input');
  const text = ta.value.trim();
  if (!text) return;

  ta.value = '';
  ta.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);

  const lower = text.toLowerCase().trim();

  // Commands
  if (['clear','clear chat'].includes(lower)) { clearChat(); document.getElementById('send-btn').disabled = false; return; }
  if (lower === 'mute') { isMuted = true; addMessage('jarvis','🔇 Voice muted, Sir.'); document.getElementById('send-btn').disabled = false; return; }
  if (lower === 'unmute') { isMuted = false; addMessage('jarvis','🔊 Voice restored, Sir.'); document.getElementById('send-btn').disabled = false; return; }
  if (lower.startsWith('open ')) {
    const site = lower.slice(5).trim();
    const urls = {youtube:'https://youtube.com', google:'https://google.com', github:'https://github.com', wikipedia:'https://wikipedia.org'};
    window.open(urls[site] || `https://${site}.com`, '_blank');
    addMessage('jarvis', `Opening **${site}**, Sir.`);
    document.getElementById('send-btn').disabled = false;
    return;
  }

  addThinking();

  try {
    conversation.push({role:'user', content: text});
    if (conversation.length > 20) conversation = conversation.slice(-20);

    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages: conversation})
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const reply = data.reply;
    conversation.push({role:'assistant', content: reply});

    removeThinking();
    addMessage('jarvis', reply);

    if (!isMuted && synth) {
      const clean = reply.replace(/[*#`]/g,'').replace(/<[^>]+>/g,'').slice(0, 280);
      const utt = new SpeechSynthesisUtterance(clean);
      utt.rate = 0.95; utt.pitch = 0.9; utt.volume = 0.9;
      const voices = synth.getVoices();
      const pref = voices.find(v => v.name.includes('Daniel') || v.name.includes('David') || v.name.includes('Google UK'));
      if (pref) utt.voice = pref;
      synth.speak(utt);
    }

  } catch(e) {
    removeThinking();
    addMessage('jarvis', `⚠️ Error: **${e.message}**. Something went wrong, Sir.`);
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

// ── Voice input ──────────────────────────────────
function setupSpeechRecognition() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('user-input').value = transcript;
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('speech-wave').classList.remove('active');
  };
}

function toggleMic() {
  if (!recognition) { alert('Voice input not supported. Try Chrome.'); return; }
  if (isListening) { recognition.stop(); }
  else {
    recognition.start();
    isListening = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('speech-wave').classList.add('active');
  }
}

// ── Helpers ──────────────────────────────────────
function clearChat() {
  conversation = [];
  document.getElementById('messages').innerHTML = '';
  addMessage('jarvis', 'Memory cleared. Ready for new directives, Sir.');
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted && synth) synth.cancel();
}

function useHint(text) {
  const ta = document.getElementById('user-input');
  ta.value = text;
  ta.focus();
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}
</script>
